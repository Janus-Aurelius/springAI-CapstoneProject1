spring.application.name=springaiagent
spring.threads.virtual.enabled=true
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.ai.chat.memory.redis.host=${REDIS_HOST:localhost}
spring.ai.chat.memory.redis.port=${REDIS_PORT:6379}
spring.ai.vectorstore.redis.uri=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
management.otlp.metrics.export.enabled=false
# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JDBC Chat Memory Configuration
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.autoconfigure.exclude=org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration

# Spring AI Configuration
app.llm.planning.model=${PLANNING_MODEL:gpt-4o}
app.llm.reasoning.model=${REASONING_MODEL:gpt-4o-mini}
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.temperature=0.2

# Warm Pool Sandbox Configuration
sandbox.core-pool-size=2
sandbox.max-pool-size=5
sandbox.compute-image=python:3.12-alpine
sandbox.fetch-image=alpine:latest

# MCP Server URLs
mcp.server.postgres.url=${MCP_POSTGRES_URL:http://localhost:8081/sse}
mcp.server.github.url=${MCP_GITHUB_URL:http://localhost:8082/sse}
mcp.server.puppeteer.url=${MCP_PUPPETEER_URL:http://localhost:8083/sse}
mcp.server.brave-search.url=${MCP_BRAVE_SEARCH_URL:http://localhost:8084/sse}
mcp.server.slack.url=${MCP_SLACK_URL:http://localhost:8085/sse}
mcp.server.notion.url=${MCP_NOTION_URL:http://localhost:8086/sse}