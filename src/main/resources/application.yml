spring:
  application:
    name: springaiagent
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key}
    chat:
      memory:
        redis:
          host: ${REDIS_HOST:localhost}
          port: ${REDIS_PORT:6379}
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      redis:
        uri: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  autoconfigure:
    exclude: org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration

management:
  otlp:
    metrics:
      export:
        enabled: false

app:
  llm:
    strip-reasoning: true
    guardrails:
      max-actions: 20
      max-replans: 5
      stagnation-threshold: 3
      max-token-budget: 100000
      max-observation-tokens: 2000
    providers:
      - id: "primary-gemini"
        base-url: "${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}"
        api-key: "${OPENAI_API_KEY:dummy-key}"
        is-primary: true
        max-context-window: 1000000
        models:
          planner: "${PLANNING_MODEL:gemini-1.5-pro}"
          reasoner: "${REASONING_MODEL:gemini-2.0-flash-lite-preview-02-05}"
      - id: "fallback-groq"
        base-url: "${FALLBACK_OPENAI_BASE_URL:https://api.groq.com/openai/v1}"
        api-key: "${FALLBACK_OPENAI_API_KEY:dummy-key}"
        is-primary: false
        max-context-window: 32768
        models:
          planner: "${FALLBACK_PLANNING_MODEL:llama-3.3-70b-versatile}"
          reasoner: "${FALLBACK_REASONING_MODEL:llama-3.1-8b-instant}"

sandbox:
  core-pool-size: 2
  max-pool-size: 5
  compute-image: python:3.12-alpine
  fetch-image: alpine:latest

mcp:
  server:
    tavily-search:
      url: ${MCP_TAVILY_SEARCH_URL:http://localhost:8084/sse}
