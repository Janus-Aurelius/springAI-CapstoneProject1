version: '3.8'

services:
  squid:
    image: ubuntu/squid:latest
    container_name: squid
    volumes:
      - ./src/main/resources/sandbox/squid.conf:/etc/squid/squid.conf
    ports:
      - "3128:3128"
    networks:
      - sandbox_net
      - external_net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-ai-agent
    ports:
      - "8080:8080"
    environment:
      - SPRING_AI_OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPRING_AI_OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
      - PLANNING_MODEL=${PLANNING_MODEL:-gpt-4o}
      - REASONING_MODEL=${REASONING_MODEL:-gpt-4o-mini}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - MCP_POSTGRES_URL=${MCP_POSTGRES_URL:-http://mcp-postgres:8081/sse}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_NAME=${POSTGRES_DB:-postgres}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      # - MCP_GITHUB_URL=${MCP_GITHUB_URL:-http://mcp-github:8082/sse}
      # - MCP_PUPPETEER_URL=${MCP_PUPPETEER_URL:-http://mcp-puppeteer:8083/sse}
      # - MCP_BRAVE_SEARCH_URL=${MCP_BRAVE_SEARCH_URL:-http://mcp-brave-search:8084/sse}
      # - MCP_SLACK_URL=${MCP_SLACK_URL:-http://mcp-slack:8085/sse}
      # - MCP_NOTION_URL=${MCP_NOTION_URL:-http://mcp-notion:8086/sse}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - squid
      - mcp-postgres
      - redis
      # - mcp-github
      # - mcp-puppeteer
      # - mcp-brave-search
      # - mcp-slack
      # - mcp-notion
    networks:
      - sandbox_net
      - external_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    networks:
      - external_net
    restart: unless-stopped

  mcp-postgres:
    image: node:20-alpine
    container_name: mcp-postgres
    command: npx -y mcp-proxy --port 8081 -- npx -y @modelcontextprotocol/server-postgres postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
    depends_on:
      - postgres
    ports:
      - "8081:8081"
    networks:
      - external_net
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - external_net
    restart: unless-stopped

  # mcp-github:
  #   image: node:20-alpine
  #   container_name: mcp-github
  #   command: npx -y mcp-proxy --port 8082 -- npx -y @modelcontextprotocol/server-github
  #   environment:
  #     - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
  #   ports:
  #     - "8082:8082"
  #   networks:
  #     - external_net
  #   restart: unless-stopped

  # mcp-puppeteer:
  #   image: ghcr.io/puppeteer/puppeteer:latest
