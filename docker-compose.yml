version: '3.8'

services:
  squid:
    image: ubuntu/squid:latest
    container_name: squid
    volumes:
      - ./src/main/resources/sandbox/squid.conf:/etc/squid/squid.conf
    ports:
      - "3128:3128"
    networks:
      - sandbox_net
      - external_net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-ai-agent
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./app_reasoning.log:/app/app_reasoning.log
      - ./app.log:/app/app.log
    stop_grace_period: 30s
    depends_on:
      - squid
      - mcp-postgres
      - redis
      - mcp-github
      - mcp-puppeteer
      - mcp-tavily-search
    networks:
      - sandbox_net
      - external_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    networks:
      - external_net
    restart: unless-stopped

  mcp-postgres:
    image: node:22-alpine
    container_name: mcp-postgres
    command: npx -y mcp-proxy --debug --shell --port 8081 -- npx -y @modelcontextprotocol/server-postgres postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
    depends_on:
      - postgres
    ports:
      - "8081:8081"
    networks:
      - external_net
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - external_net
    restart: unless-stopped

  mcp-github:
    image: node:22-alpine
    container_name: mcp-github
    command: npx -y mcp-proxy --debug --shell --port 8082 -- npx -y @modelcontextprotocol/server-github
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    ports:
      - "8082:8082"
    networks:
      - external_net
    restart: unless-stopped

  mcp-puppeteer:
    image: ghcr.io/puppeteer/puppeteer:latest
    container_name: mcp-puppeteer
    command: npx -y mcp-proxy --debug --shell --port 8083 -- npx -y @modelcontextprotocol/server-puppeteer
    ports:
      - "8083:8083"
    networks:
      - external_net
    restart: unless-stopped

  mcp-tavily-search:
    image: node:22-alpine
    container_name: mcp-tavily-search
    command: npx -y mcp-proxy --debug --shell --port 8084 -- npx -y tavily-mcp
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    ports:
      - "8084:8084"
    networks:
      - external_net
    restart: unless-stopped

  # mcp-slack:
  #   image: node:20-alpine
  #   container_name: mcp-slack
  #   command: npx -y mcp-proxy --debug --shell --port 8085 -- npx -y @modelcontextprotocol/server-slack
  #   environment:
  #     - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
  #   ports:
  #     - "8085:8085"
  #   networks:
  #     - external_net
  #   restart: unless-stopped

  # mcp-notion:
  #   image: node:20-alpine
  #   container_name: mcp-notion
  #   command: npx -y mcp-proxy --debug --shell --port 8086 -- npx -y @modelcontextprotocol/server-notion
  #   environment:
  #     - NOTION_API_KEY=${NOTION_API_KEY}
  #   ports:
  #     - "8086:8086"
  #   networks:
  #     - external_net
  #   restart: unless-stopped

networks:
  sandbox_net:
    name: sandbox_net
    driver: bridge
    internal: true
  external_net:
    name: external_net
    driver: bridge
