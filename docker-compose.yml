version: '3.8'

services:
  squid:
    image: ubuntu/squid:latest
    container_name: squid
    volumes:
      - ./src/main/resources/sandbox/squid.conf:/etc/squid/squid.conf
    ports:
      - "3128:3128"
    networks:
      - sandbox_net
      - external_net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-ai-agent
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://us.cloud.langfuse.com}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./app_reasoning.log:/app/app_reasoning.log
      - ./app.log:/app/app.log
    stop_grace_period: 30s
    depends_on:
      squid:
        condition: service_started
      postgres:
        condition: service_started
      mcp-postgres:
        condition: service_started
      mcp-github:
        condition: service_started
      mcp-puppeteer:
        condition: service_healthy
      mcp-tavily-search:
        condition: service_started
    networks:
      - sandbox_net
      - external_net
    restart: unless-stopped



  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    networks:
      - external_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 3s
      timeout: 3s
      retries: 10

  mcp-postgres:
    image: node:22-alpine
    container_name: mcp-postgres
    command: npx -y mcp-proxy --debug --shell --port 8081 -- npx -y @modelcontextprotocol/server-postgres postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
    depends_on:
      - postgres
    ports:
      - "8081:8081"
    networks:
      - external_net
    restart: unless-stopped

  mcp-github:
    image: node:22-alpine
    container_name: mcp-github
    command: npx -y mcp-proxy --debug --shell --port 8082 -- npx -y @modelcontextprotocol/server-github
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    ports:
      - "8082:8082"
    networks:
      - external_net
    restart: unless-stopped

  mcp-puppeteer:
    image: ghcr.io/puppeteer/puppeteer:latest
    container_name: mcp-puppeteer
    command: npx -y mcp-proxy --debug --shell --port 8083 -- npx -y @modelcontextprotocol/server-puppeteer
    ports:
      - "8083:8083"
    networks:
      - external_net
    healthcheck:
      test: ["CMD", "node", "-e", "const net = require('net'); const client = net.createConnection({ port: 8083 }, () => { client.end(); process.exit(0); }); client.on('error', () => process.exit(1));"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  mcp-tavily-search:
    image: node:22-alpine
    container_name: mcp-tavily-search
    command: npx -y mcp-proxy --debug --shell --port 8084 -- npx -y tavily-mcp
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    ports:
      - "8084:8084"
    networks:
      - external_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    volumes:
      - ./src/main/resources/sandbox/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9093:9090"
    networks:
      - external_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3005:3000"
    volumes:
      - ./src/main/resources/sandbox/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    depends_on:
      - prometheus
      - postgres
    networks:
      - external_net
    restart: unless-stopped

networks:
  sandbox_net:
    name: sandbox_net
    driver: bridge
    internal: true
  external_net:
    name: external_net
    driver: bridge
